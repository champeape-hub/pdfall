<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compress PDF — PDF All-in-One</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#fff" stroke-width="2"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <span class="logo-text">PDF <strong>All-in-One</strong></span>
      </a>
      <div class="nav-right">
        <button class="lang-toggle" onclick="toggleLang()"><span id="langLabel">EN | اردو</span></button>
        <a href="../index.html" class="btn-nav" data-en="All Tools" data-ur="تمام ٹولز">All Tools</a>
      </div>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="../index.html" data-en="← All Tools" data-ur="← تمام ٹولز">← All Tools</a>
    </div>
  </nav>

  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        <span data-en="Back to All Tools" data-ur="تمام ٹولز پر واپس">Back to All Tools</span>
      </a>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
        <div class="tool-icon" style="background:#ffedd5;color:#f97316;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        </div>
        <h1 data-en="Compress PDF" data-ur="PDF کمپریس کریں">Compress PDF</h1>
      </div>
      <p data-en="Reduce your PDF file size. Perfect for email attachments and sharing." data-ur="اپنی PDF فائل کا سائز کم کریں۔ ای میل اٹیچمنٹ کے لیے بہترین۔">Reduce your PDF file size. Perfect for email attachments and sharing.</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".pdf"/>
      <div class="upload-icon">📦</div>
      <h3 data-en="Drop your PDF here" data-ur="اپنی PDF یہاں ڈراپ کریں">Drop your PDF here</h3>
      <p data-en="or click to browse" data-ur="یا براؤز کرنے کے لیے کلک کریں">or click to browse</p>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="action-area">
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="status-msg" id="statusMsg"></p>
      <button class="btn-primary" id="compressBtn" disabled onclick="compressPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8"/></svg>
        <span data-en="Compress PDF" data-ur="PDF کمپریس کریں">Compress PDF</span>
      </button>
      <a class="btn-download" id="downloadBtn" download="compressed.pdf">
        ⬇ <span data-en="Download Compressed PDF" data-ur="کمپریس شدہ PDF ڈاؤن لوڈ کریں">Download Compressed PDF</span>
      </a>
    </div>

    <div class="privacy-note">
      🔒 <span data-en="100% browser-based. Your file never leaves your device." data-ur="مکمل براؤزر میں۔ آپ کی فائل کبھی آپ کے ڈیوائس سے نہیں جاتی۔">100% browser-based. Your file never leaves your device.</span>
    </div>
  </div>

  <script>
    let selectedFile = null;

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileList = document.getElementById('fileList');
    const compressBtn = document.getElementById('compressBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMsg = document.getElementById('statusMsg');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    fileInput.addEventListener('change', e => setFile(e.target.files[0]));
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      const f = [...e.dataTransfer.files].find(f => f.type === 'application/pdf');
      if (f) setFile(f);
    });

    function formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setFile(f) {
      if (!f) return;
      selectedFile = f;
      fileList.innerHTML = `
        <div class="file-item">
          <span class="file-item-icon">📄</span>
          <span class="file-item-name">${f.name}</span>
          <span class="file-item-size">${formatSize(f.size)}</span>
          <button class="file-item-remove" onclick="clearFile()">✕</button>
        </div>`;
      compressBtn.disabled = false;
      downloadBtn.classList.remove('visible');
      statusMsg.textContent = '';
    }

    function clearFile() {
      selectedFile = null;
      fileList.innerHTML = '';
      compressBtn.disabled = true;
      downloadBtn.classList.remove('visible');
      statusMsg.textContent = '';
      fileInput.value = '';
    }

    async function compressPDF() {
      if (!selectedFile) return;
      compressBtn.disabled = true;
      progressBar.classList.add('visible');
      progressFill.style.width = '20%';
      statusMsg.textContent = 'Compressing...';
      statusMsg.className = 'status-msg';

      try {
        const { PDFDocument } = PDFLib;
        const buf = await selectedFile.arrayBuffer();
        progressFill.style.width = '50%';
        const doc = await PDFDocument.load(buf, { ignoreEncryption: true });
        progressFill.style.width = '80%';
        const pdfBytes = await doc.save({ useObjectStreams: true });
        progressFill.style.width = '100%';

        const origSize = selectedFile.size;
        const newSize = pdfBytes.length;
        const saved = Math.max(0, Math.round((1 - newSize / origSize) * 100));

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        downloadBtn.href = URL.createObjectURL(blob);
        downloadBtn.classList.add('visible');

        statusMsg.textContent = saved > 0
          ? `✅ Done! Reduced by ${saved}% (${formatSize(origSize)} → ${formatSize(newSize)})`
          : `✅ Done! File optimized (${formatSize(newSize)})`;
        statusMsg.className = 'status-msg success';
      } catch (err) {
        statusMsg.textContent = '❌ Error: ' + err.message;
        statusMsg.className = 'status-msg error';
      }

      compressBtn.disabled = false;
      setTimeout(() => progressBar.classList.remove('visible'), 1200);
    }
  </script>
  <script src="../js/lang.js"></script>
</body>
</html>
