<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image to PDF — PDF All-in-One</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#fff" stroke-width="2"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <span class="logo-text">PDF <strong>All-in-One</strong></span>
      </a>
      <div class="nav-right">
        <button class="lang-toggle" onclick="toggleLang()"><span id="langLabel">EN | اردو</span></button>
        <a href="../index.html" class="btn-nav" data-en="All Tools" data-ur="تمام ٹولز">All Tools</a>
      </div>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="../index.html" data-en="← All Tools" data-ur="← تمام ٹولز">← All Tools</a>
    </div>
  </nav>

  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        <span data-en="Back to All Tools" data-ur="تمام ٹولز پر واپس">Back to All Tools</span>
      </a>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
        <div class="tool-icon" style="background:#dbeafe;color:#2563eb;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </div>
        <h1 data-en="Image to PDF" data-ur="تصویر سے PDF">Image to PDF</h1>
      </div>
      <p data-en="Convert JPG or PNG images into a PDF file. Add multiple images — each becomes a page." data-ur="JPG یا PNG تصاویر کو PDF میں بدلیں۔ متعدد تصاویر شامل کریں — ہر ایک صفحہ بنے گا۔">Convert JPG or PNG images into a PDF file. Add multiple images — each becomes a page.</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple/>
      <div class="upload-icon">🖼️</div>
      <h3 data-en="Drop images here" data-ur="تصاویر یہاں ڈراپ کریں">Drop images here</h3>
      <p data-en="JPG, PNG, WEBP — select multiple" data-ur="JPG، PNG، WEBP — متعدد منتخب کریں">JPG, PNG, WEBP — select multiple</p>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="action-area">
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="status-msg" id="statusMsg"></p>
      <button class="btn-primary" id="convertBtn" disabled onclick="convertToPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M21 15l-5-5L5 21"/></svg>
        <span data-en="Convert to PDF" data-ur="PDF میں بدلیں">Convert to PDF</span>
      </button>
      <a class="btn-download" id="downloadBtn" download="images.pdf">
        ⬇ <span data-en="Download PDF" data-ur="PDF ڈاؤن لوڈ کریں">Download PDF</span>
      </a>
    </div>

    <div class="privacy-note">
      🔒 <span data-en="Images processed locally. Never uploaded anywhere." data-ur="تصاویر مقامی طور پر پروسیس ہوتی ہیں۔ کہیں اپ لوڈ نہیں ہوتیں۔">Images processed locally. Never uploaded anywhere.</span>
    </div>
  </div>

  <script>
    let files = [];

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMsg = document.getElementById('statusMsg');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    fileInput.addEventListener('change', e => addFiles([...e.target.files]));
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
    });

    function formatSize(b) {
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function addFiles(newFiles) {
      newFiles.forEach(f => { if (f.type.startsWith('image/')) files.push(f); });
      renderList();
    }

    function renderList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="file-item-icon">🖼️</span>
          <span class="file-item-name">${f.name}</span>
          <span class="file-item-size">${formatSize(f.size)}</span>
          <button class="file-item-remove" onclick="removeFile(${i})">✕</button>`;
        fileList.appendChild(item);
      });
      convertBtn.disabled = files.length === 0;
      downloadBtn.classList.remove('visible');
      statusMsg.textContent = '';
    }

    function removeFile(i) { files.splice(i, 1); renderList(); }

    function readFileAsArrayBuffer(f) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsArrayBuffer(f);
      });
    }

    async function convertToPDF() {
      if (!files.length) return;
      convertBtn.disabled = true;
      progressBar.classList.add('visible');
      progressFill.style.width = '10%';
      statusMsg.textContent = 'Converting...';
      statusMsg.className = 'status-msg';

      try {
        const { PDFDocument } = PDFLib;
        const doc = await PDFDocument.create();

        for (let i = 0; i < files.length; i++) {
          const buf = await readFileAsArrayBuffer(files[i]);
          let img;
          if (files[i].type === 'image/png') img = await doc.embedPng(buf);
          else img = await doc.embedJpg(buf);

          const page = doc.addPage([img.width, img.height]);
          page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
          progressFill.style.width = ((i + 1) / files.length * 90) + '%';
        }

        const pdfBytes = await doc.save();
        progressFill.style.width = '100%';

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        downloadBtn.href = URL.createObjectURL(blob);
        downloadBtn.classList.add('visible');
        statusMsg.textContent = `✅ Done! ${files.length} image(s) converted to PDF.`;
        statusMsg.className = 'status-msg success';
      } catch (err) {
        statusMsg.textContent = '❌ Error: ' + err.message;
        statusMsg.className = 'status-msg error';
      }

      convertBtn.disabled = false;
      setTimeout(() => progressBar.classList.remove('visible'), 1200);
    }
  </script>
  <script src="../js/lang.js"></script>
</body>
</html>
